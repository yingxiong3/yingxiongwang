<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>正在跳转...</title>
    <script>
        // 获取URL参数并解码
        const urlParams = new URLSearchParams(window.location.search);
        const encodedUrl = urlParams.get('c');
        
        if (encodedUrl) {
            try {
                // Base64解码
                const decodedUrl = decodeURIComponent(escape(atob(encodedUrl)));
                if (decodedUrl && /^(https?|ftp):\/\//i.test(decodedUrl)) {
                    // 显示跳转信息
                    document.getElementById('target-url').textContent = decodedUrl;
                    
                    // 自动跳转
                    setTimeout(() => {
                        window.location.href = decodedUrl;
                    }, 2000);
                    
                    // 设置手动跳转按钮
                    document.getElementById('jump-btn').href = decodedUrl;
                } else {
                    document.getElementById('message').textContent = '无效的URL格式';
                }
            } catch (e) {
                document.getElementById('message').textContent = 'URL解析失败';
            }
        } else {
            document.getElementById('message').textContent = '未提供跳转参数';
        }
    </script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; }
        .url { word-break: break-all; background: #f5f5f5; padding: 10px; margin: 20px 0; }
        .btn { background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>防红链接跳转</h2>
    <p>正在准备跳转到目标网址...</p>
    <div class="url" id="target-url"></div>
    <a href="#" class="btn" id="jump-btn">立即跳转</a>
    <p id="message"></p>
</body>
</html>
