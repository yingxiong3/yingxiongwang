<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>跳转中...</title>
  <script>
    // 获取URL参数
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    // Base64解码函数
    function base64Decode(str) {
      return decodeURIComponent(escape(atob(str)));
    }
    
    // 页面加载时执行跳转
    window.onload = function() {
      const encodedUrl = getQueryParam('c');
      if (encodedUrl) {
        try {
          const originalUrl = base64Decode(encodedUrl);
          window.location.href = originalUrl;
        } catch (e) {
          document.body.innerHTML = '<div style="text-align:center;padding:50px 20px;font-family:sans-serif;">'
            + '<h2>跳转链接无效</h2>'
            + '<p>抱歉，此链接可能已损坏或过期。</p>'
            + '</div>';
        }
      } else {
        document.body.innerHTML = '<div style="text-align:center;padding:50px 20px;font-family:sans-serif;">'
          + '<h2>缺少跳转参数</h2>'
          + '<p>抱歉，此链接缺少必要的跳转信息。</p>'
          + '</div>';
      }
    }
  </script>
</head>
<body>
  <div style="text-align:center;padding:50px 20px;font-family:sans-serif;">
    <h2>正在跳转...</h2>
    <p>请稍候，正在为您跳转到目标网站。</p>
  </div>
</body>
</html>
