<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳转中 - 防红链接</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-width: 90%;
      width: 400px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      margin: 0 0 1rem 0;
      font-size: 1.5rem;
    }
    p {
      margin: 0.5rem 0;
      line-height: 1.5;
    }
    .error {
      background: rgba(239, 68, 68, 0.2);
      padding: 1rem;
      border-radius: 10px;
      margin: 1rem 0;
    }
    .manual-link {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .manual-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h1 id="status">正在跳转...</h1>
    <p id="message">请稍候，正在为您准备跳转</p>
    <div id="error" class="error" style="display: none;">
      <h2>缺少跳转参数</h2>
      <p>抱歉，此链接缺少必要的跳转信息。</p>
    </div>
    <a href="#" id="manualLink" class="manual-link" style="display: none;">手动跳转</a>
  </div>

  <script>
    // 更健壮的URL参数获取函数
    function getQueryParam(name) {
      try {
        // 处理hash路由的情况
        const queryString = window.location.search || window.location.hash.split('?')[1] || '';
        const urlParams = new URLSearchParams(queryString);
        return urlParams.get(name);
      } catch (e) {
        console.error('解析URL参数失败:', e);
        return null;
      }
    }

    // Base64解码函数
    function base64Decode(str) {
      try {
        // 处理URL安全的Base64编码
        str = str.replace(/-/g, '+').replace(/_/g, '/');
        // 添加padding
        while (str.length % 4) {
          str += '=';
        }
        return decodeURIComponent(escape(atob(str)));
      } catch (e) {
        console.error('Base64解码失败:', e);
        throw new Error('解码失败');
      }
    }

    // 页面加载时执行
    document.addEventListener('DOMContentLoaded', function() {
      const encodedUrl = getQueryParam('c');
      const statusEl = document.getElementById('status');
      const messageEl = document.getElementById('message');
      const errorEl = document.getElementById('error');
      const spinnerEl = document.getElementById('spinner');
      const manualLink = document.getElementById('manualLink');

      if (encodedUrl) {
        try {
          const originalUrl = base64Decode(encodedUrl);
          
          // 验证URL格式
          if (!/^(https?|ftp|magnet|thunder|ed2k):\/\//i.test(originalUrl)) {
            throw new Error('无效的URL格式');
          }

          // 显示目标域名（安全起见，只显示域名）
          try {
            const domain = new URL(originalUrl).hostname;
            messageEl.innerHTML = `即将跳转到: <br><strong>${domain}</strong>`;
          } catch (e) {
            messageEl.textContent = '正在准备跳转...';
          }

          // 设置手动跳转链接
          manualLink.href = originalUrl;
          manualLink.style.display = 'inline-block';

          // 3秒后自动跳转
          setTimeout(() => {
            window.location.href = originalUrl;
          }, 3000);

        } catch (e) {
          console.error('跳转失败:', e);
          showError('跳转链接无效', '抱歉，此链接可能已损坏或格式不正确。');
        }
      } else {
        showError('缺少跳转参数', '抱歉，此链接缺少必要的跳转信息。');
      }

      function showError(title, message) {
        statusEl.textContent = title;
        messageEl.textContent = message;
        errorEl.style.display = 'block';
        spinnerEl.style.display = 'none';
        manualLink.style.display = 'none';
      }
    });
  </script>
</body>
</html>
